    --clr-dark: #0a1d33;
    --clr-text-muted: #57697e;

    --font-display: 'Georgia', 'Times New Roman', serif;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: var(--font-body);
    background: linear-gradient(135deg, #eef3f9 0%, #e4edf6 60%, #fbf5ea 100%);
    color: var(--clr-text-muted);

    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    right: -180px;
    top: -140px;
    width: 620px;
    height: 620px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(127,164,207,0.22) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: absolute;
    left: -140px;
    bottom: -140px;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(193,137,63,0.16) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--clr-white);
    border-radius: 32px;
    box-shadow: 0 26px 66px rgba(10,29,51,0.18);
    padding: 64px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }

  .tooth {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    animation: bounce 1.6s ease-in-out infinite alternate;
  }

  .tooth svg { width: 100%; height: 100%; }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-10px); }
  }

  .code {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(4rem, 14vw, 6.5rem);
    line-height: 1;
    color: var(--clr-primary);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .code em {
    font-style: normal;
    color: var(--clr-accent);
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    color: var(--clr-dark);
    font-weight: 700;
    margin-bottom: 14px;
  }

  p {
    font-size: 0.98rem;
    line-height: 1.7;
    color: var(--clr-text-muted);
    margin-bottom: 32px;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 99px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--clr-primary);
    color: var(--clr-white);
    box-shadow: 0 8px 24px rgba(22,58,99,0.3);
  }

  .btn-primary:hover {
    background: var(--clr-dark);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(22,58,99,0.4);
  }

  .btn-outline {
    background: transparent;
    color: var(--clr-primary);
    border-color: var(--clr-primary);
  }

  .btn-outline:hover {
    background: var(--clr-primary);
    color: var(--clr-white);
    transform: translateY(-2px);
  }

  .footnote {
    margin-top: 28px;
    font-size: 0.78rem;
    color: rgba(87,105,126,0.7);
  }

  @media (max-width: 480px) {
    .card {
      padding: 44px 26px;
      border-radius: 24px;
    }
    .actions {
      flex-direction: column;
    }
    .btn {
      justify-content: center;
    }
  }
</style>
